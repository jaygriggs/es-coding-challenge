<!DOCTYPE html>
<html>
<head>
<title>Employee List</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/app.css">
<script type="text/javascript" src="js/api.js"></script>
<script type="text/javascript" src="js/ui.js"></script>
<script type="text/javascript" src="js/list.js"></script>
</head>

<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/frontend/dashboard.html">Employee Manager</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/frontend/dashboard.html" id="nav_home">Home</a>
                <a class="nav-link" href="/frontend/employee_edit.html" id="nav_profile">My Profile</a>
                <a class="nav-link" href="/frontend/employee_list.html" id="nav_employee_list">Employee List</a>
                <a class="nav-link" href="#" id="nav_logout">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container my-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h5 class="card-title mb-1">Employee Directory</h5>
                    <p class="text-muted mb-0">Admins can edit any employee record.</p>
                </div>
                <a href="/frontend/employee_add.html" class="btn btn-primary">+ Add Employee</a>
            </div>
            <div class="table-responsive">
                <table id="employee_table" class="table table-striped align-middle">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th class="d-none d-lg-table-cell">Username</th>
                            <th>Date of Birth</th>
                            <th class="d-none d-lg-table-cell">Office</th>
                            <th class="d-none d-lg-table-cell">Category</th>
                            <th class="d-none d-lg-table-cell">Role</th>
                            <th>Phone</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="app_toast" class="toast text-bg-info" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-body"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
