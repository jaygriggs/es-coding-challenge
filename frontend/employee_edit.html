<!DOCTYPE html>
<html>
<head>
<title>Employee Edit</title>
<script type="text/javascript" src="js/api.js"></script>
<script type="text/javascript" src="js/form_filler.js"></script>
<script type="text/javascript" src="js/edit.js"></script>
<link rel="stylesheet" href="css/app.css">
</head>

<body>
<div id="save_msg" class="message"></div>
<div class="instructions">
    Enter your employee information below
</div>
<form id="employee_record" action="" method="POST">
    <div>
        <label for="first_name">First Name</label>
        <input id="first_name" type="text" name="first_name" value="">
    </div>
    <div>
        <label for="last_name">Last name</label>
        <input id="last_name" type="text" name="last_name" value="">      
    </div>      
    <div>
        <label for="phone">Phone Number</label>
        <input id="phone" type="text" name="phone" value="">
    </div>
    <div>
        <label for="office_number">Office Number</label>
        <input id="office_number" type="text" name="office_number" value="">
    </div>
    <div>
        <label for="date_of_birth">Date of Birth</label>
        <input id="date_of_birth" type="date" name="date_of_birth" value="">
    </div>
    <div>
        <label for="employee_category">Employee Category</label>
        <select id="employee_category" name="employee_category">
            <option value="">Select</option>
            <option value="full_time">Full Time</option>
            <option value="part_time">Part Time</option>
            <option value="intern">Intern</option>
            <option value="contractor">Contractor</option>
        </select>
    </div>
    <div>
        <input type="Submit" value="Save">
    </div>
</form>
</body>

</html>
