<!DOCTYPE html>
<html>
<head>
<title>Employee Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/app.css">
<script type="text/javascript" src="js/api.js"></script>
<script type="text/javascript" src="js/ui.js"></script>
<script type="text/javascript" src="js/auth.js"></script>
</head>

<body>
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title mb-3">Employee Login</h4>
                    <p class="text-muted">Sign in to manage your profile.</p>
                    <form id="login_form" action="" method="POST" class="row g-3" novalidate>
                        <div class="col-12">
                            <label for="username" class="form-label">Username</label>
                            <input id="username" type="text" name="username" class="form-control" required>
                            <div class="invalid-feedback">Username is required.</div>
                        </div>
                        <div class="col-12">
                            <label for="password" class="form-label">Password</label>
                            <input id="password" type="password" name="password" class="form-control" required>
                            <div class="invalid-feedback">Password is required.</div>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary w-100">Sign In</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="app_toast" class="toast text-bg-info" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-body"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
